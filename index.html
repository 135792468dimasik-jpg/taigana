<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандонавтика - Тайгана</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #map {
            width: 100%;
            height: 300px;
            background-color: #e0e0e0;
            margin-top: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background-color: #1b5e20;
        }
        #place-info {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Тайгана</h1>
        <p>Нажми на кнопку, чтобы получить геолокацию скрытого памятника</p>
        
        <button id="random-btn">Найти памятник</button>

        <div id="place-info"></div>
        
        <div id="map">Здесь будет интерактивная карта</div>
    </div>

    <script>
        // 1. База данных памятников
        const monuments = [
            {
                name: "Дидинский тоннель",
                description: "Заброшенный дореволюционный ж/д тоннель длиной более 1 км. Внутри круглый год лежит лед, а атмосфера напоминает мистический триллер",
                hint: "Ищите старый бетонный портал в густом лесу недалеко от ж/д перегона Дидино. Возьмите мощный фонарь и сапоги!",
                lat: 56.818624,
                lng: 59.696919
            },
            {
                name: "Уральский Марс",
                description: "Действующий карьер по добыче огнеупорной глины. Из-за минералов земля здесь окрашена в багровые, оранжевые и черные тона, создавая полное ощущение другой планеты",
                hint: "Находится под Богдановичем. Ищите глазами огромные растрескавшиеся холмы и озера с багровой водой.",
                lat: 56.619962,
                lng: 62.089018
            },
            {
                name: "Кыштымский Бали",
                description: "Заброшенный каолиновый карьер с лазурно-бирюзовой водой и белоснежными глиняными берегами, напоминающий тропический курорт. Купаться тут нельзя, но фото получаются космические",
                hint: "Двигайтесь по грунтовой дороге от окраины Кыштыма. Ориентир — ослепительно белые насыпи за деревьями.",
                lat: 55.677500,
                lng: 60.597500
            },
            {
                name: "Порог Ревун",
                description: "Единственный на среднем Урале бурный горный порог на равнинной реке Исеть. Весной здесь кипит вода, а вокруг высятся отвесные скалы",
                hint: "Ищите шум бушующей воды за деревьями сразу на выезде из деревни Бекленищева.",
                lat: 56.433833,
                lng: 61.602583
            },
            {
                name: "Аракульский Шихан",
                description: "Величественная гранитная стена посреди леса, созданная выветриванием за миллионы лет. С вершины открывается вид на 11 озер Южного Урала",
                hint: "От озера Аракуль идите вверх по старой крутой тропе через сосновый бор, пока не упретесь в скалы",
                lat: 55.981667,
                lng: 60.493611
            },
            {
                name: "Старая Губаха",
                description: "Город-призрак в Пермском крае. Заброшенный шахтерский поселок, который постепенно поглощает тайга. Сохранились остовы зданий советской архитектуры",
                hint: "Перейдите через подвесной мост над рекой Косьва и двигайтесь по заросшим улицам бывших кварталов",
                lat: 58.871886,
                lng: 57.601864
            },
            {
                name: "Большая Каменная река",
                description: "Хаотичное нагромождение огромных авантюриновых валунов длиной более 6 км в нацпарке Таганай. Камни буквально «текут» между горными хребтами",
                hint: "Идите по Нижней тропе парка Таганай. Вы поймете, что на месте, когда лес резко оборвется морем камней",
                lat: 55.245717,
                lng: 59.773408
            },
            {
                name: "Святлище Большие Аллаки",
                description: "Древнее языческое святилище, которому более 7 тысяч лет. Посреди степи у озера одиноко стоят 14 огромных гранитных скал («каменных палаток»). Археологи нашли здесь наскальные рисунки древних людей и следы жертвоприношений",
                hint: "Двигайтесь к южному берегу озера Большие Аллаки (Челябинская область). Скалы стоят группой прямо в поле. Обойдите их кругом и всмотритесь в ниши — там сохранились рисунки первобытных людей, сделанные охрой",
                lat: 55.958556,
                lng: 60.921389
            },
            {
                name: "Усьвинские Столбы и Чёртов Палец",
                description: "Величественная каменная стена высотой 120 метров, растянувшаяся вдоль реки. Самая культовая точка — скала «Чёртов Палец», которая чудом держится на тонкой «ножке». Здесь снимали фильм «Географ глобус пропил»",
                hint: "От поселка Усьва в Пермском крае идите пешком вдоль реки около 5 км, а затем поднимайтесь по крутой тропе на самую вершину. Осторожнее на краю смотровой площадки — вид на «Палец» там захватывает дух",
                lat: 58.654322,
                lng: 57.643356
            }
        ];

        // 2. Находим элементы на странице
        const button = document.getElementById('random-btn');
        const infoDiv = document.getElementById('place-info');

        // 3. Отслеживаем нажатие на кнопку
        button.addEventListener('click', () => {
            // Выбираем случайный памятник
            const randomIndex = Math.floor(Math.random() * monuments.length);
            const randomPlace = monuments[randomIndex];

            // Вставляем текст на страницу
            infoDiv.innerHTML = `
                <h2 style="color: #2e7d32; margin-bottom: 10px;">${randomPlace.name}</h2>
                <p><strong>Описание:</strong> ${randomPlace.description}</p>
                <div style="background: #e8f5e9; padding: 15px; border-left: 5px solid #2e7d32; border-radius: 4px; margin: 10px 0;">
                    <strong>Подсказка по поиску:</strong> ${randomPlace.hint}
                </div>
                <p style="color: #666;"><small>GPS Координаты: ${randomPlace.lat}, ${randomPlace.lng}</small></p>
            `;
        });
    </script>
</body>
</html>
